appId: com.electronsqlirest.boilerplate
productName: Electron SQLite REST
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/node_modules/better-sqlite3/**'
protocols:
  name: Electron Sqlite Rest
  schemes:
    - electron-sqlite-rest
copyright: Copyright 2026 Electron Sqlite Rest
win:
  executableName: electron-sqlite-rest-boilerplate
  icon: resources/app-icon.ico
  setupIcon: resources/app-icon.ico
  legalTrademarks: Copyright 2026 Electron Sqlite Rest
  requestedExecutionLevel: asInvoker
nsis:
  artifactName: ${name}-${version}-${arch}-setup.${ext}
  shortcutName: Electron Sqlite Rest Boilerplate
  uninstallDisplayName: Electron Sqlite Rest Boilerplate
  createDesktopShortcut: always
  oneClick: false # 关闭一键安装，显示安装向导
  allowToChangeInstallationDirectory: true # 允许选择安装位置
  perMachine: false
  runAfterFinish: false # 安装完不自动启动
  installerIcon: resources/app-icon.ico
  uninstallerIcon: resources/app-icon.ico
mac:
  icon: resources/icons/macos/AppIcon.icns
  identity: null # 跳过代码签名（没有 Apple 开发者证书时）
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  hardenedRuntime: false # 禁用强化运行时（需要签名）
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - snap
    - deb
  executableName: electron-sqlite-rest-boilerplate
  maintainer: electronjs.org
  category: Utility
deb:
  afterInstall: build/linux/after-install.sh
  afterRemove: build/linux/after-remove.sh
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
snap:
  publish:
    provider: generic
    url: https://example.com/auto-updates
npmRebuild: false
publish:
  provider: github
  owner: gpboyer2
  repo: electron-sqlite-rest-boilerplate
